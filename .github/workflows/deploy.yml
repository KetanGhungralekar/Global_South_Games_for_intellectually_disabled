name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            Shop_game/package-lock.json
            clock-reading-quiz-app/package-lock.json

      - name: Build Shop Game
        run: |
          cd Shop_game
          npm install
          npm run build

      - name: Build Clock Quiz App
        run: |
          cd clock-reading-quiz-app
          npm install
          npm run build

      - name: Assemble Final Build
        run: |
          mkdir final_dist
          cp index.html final_dist/
          mv Shop_game/dist final_dist/Shop_game
          mv clock-reading-quiz-app/dist final_dist/clock-reading-quiz-app

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./final_dist
