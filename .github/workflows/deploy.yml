name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            Shop_game/package-lock.json
            clock-reading-quiz-app/package-lock.json

      - name: Build Shop Game
        run: |
          cd Shop_game
          npm install
          npm run build

      - name: Build Clock Quiz App
        run: |
          cd clock-reading-quiz-app
          npm install
          npm run build

      - name: Assemble Final Build
        run: |
          mkdir final_dist
          cp index.html final_dist/
          mv Shop_game/dist final_dist/Shop_game
          mv clock-reading-quiz-app/dist final_dist/clock-reading-quiz-app

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './final_dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
